<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aura - Bienestar Emocional</title>
    <meta
      name="description"
      content="Aura - Plataforma de Bienestar con Inteligencia Artificial"
    />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#6366f1" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/assets/logo.ico" />

    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/login-register/login-register.css" />
    <link rel="stylesheet" href="/dashboard/student-dashboard.css" />
  </head>
  <body>
    <div id="navbar-placeholder"></div>

    <main id="app">
      <!-- Views will be injected here -->
      <div style="text-align: center">Cargando Aura...</div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script src="/navbar.js"></script>
    <script src="/footer.js"></script>

    <script src="/login-register/auth.js"></script>
    <script src="/login-register/camera-handler.js"></script>
    <script src="/login-register/user-views.js"></script>
    <script src="/dashboard/student-dashboard.js"></script>
    <script src="/dashboard/emotion-views.js"></script>
    <script src="/dashboard/survey-manager.js"></script>
    <script src="/dashboard/survey-view.js"></script>
    <script src="/dashboard/profile-view.js"></script>
    <script src="/admin/admin-dashboard.js"></script>
    <script src="/app.js"></script>

    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/service-worker.js")
            .catch((err) => console.log("SW registration failed: ", err));
        });
      }
    </script>
  </body>
</html>
