<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura PWA</title>
    <meta name="description" content="Aura - Progressive Web App with Facial Recognition">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#ffffff">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; }
        #status { margin-top: 20px; color: green; }
    </style>
</head>
<body>
    <h1>Aura Frontend</h1>
    <p>Connected to backend via Docker Network.</p>
    <div id="status">Checking connectivity...</div>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(registration => {
                        console.log('ServiceWorker registration successful with scope: ', registration.scope);
                    })
                    .catch(err => {
                        console.log('ServiceWorker registration failed: ', err);
                    });
            });
        }

        // Test API Connectivity
        fetch('/api/admin/') // Using admin as a test endpoint, or any exposed endpoint
            .then(response => {
                const statusDiv = document.getElementById('status');
                if (response.ok) {
                    statusDiv.textContent = 'Backend Connection Successful!';
                } else {
                    statusDiv.textContent = 'Backend Connection Failed: ' + response.status;
                    statusDiv.style.color = 'red';
                }
            })
            .catch(error => {
                const statusDiv = document.getElementById('status');
                statusDiv.textContent = 'Backend Connection Error: ' + error.message;
                statusDiv.style.color = 'red';
            });
    </script>
</body>
</html>
